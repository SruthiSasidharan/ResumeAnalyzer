{% extends 'base.html' %}
{% block title %}Error - AI Career Guidance{% endblock %}
{% block content %}
<div class="container text-center py-5">
    <i class="bi bi-exclamation-circle display-1 text-danger"></i>
    <h4 class="mt-3">Something went wrong</h4>
    <p class="text-muted">{{ message|default:"An error occurred. Please try again." }}</p>
    <a href="{% url 'dashboard' %}" class="btn btn-primary">Back to Dashboard</a>
</div>
{% endblock %}
