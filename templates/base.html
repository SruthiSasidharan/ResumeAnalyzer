<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Career Guidance & Skill Gap Analyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --accent: #6366f1;
            --dark: #1e293b;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; }
        .navbar { background: linear-gradient(135deg, #1e293b 0%, #334155 100%) !important; }
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%); }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,.08); border: none; border-radius: 12px; }
        .skill-badge { background: #e0e7ff; color: #4338ca; }
        .progress-ring { transform: rotate(-90deg); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
                <i class="bi bi-briefcase-fill me-2"></i>AI Career Guidance
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'upload_resume' %}">Upload Resume</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'job_recommendations' %}">Jobs</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 mt-5">
        <small>AI Career Guidance & Skill Gap Analyzer &copy; 2025</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
